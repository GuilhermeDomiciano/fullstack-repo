version: "3.9"

services:
  # ─── Backend (Laravel 11 + PHP 8.2) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fusionrun_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: FusionRun
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
      FRONTEND_URL: http://localhost:3000
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      # Persist SQLite database across container restarts
      - sqlite_data:/var/www/database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health", "||", "curl", "-f", "http://localhost:8000/up"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ─── Frontend (React + Vite built, served via nginx) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty so nginx proxy handles /api routing to backend container
        VITE_API_BASE_URL: ""
    container_name: fusionrun_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  sqlite_data:
    driver: local
